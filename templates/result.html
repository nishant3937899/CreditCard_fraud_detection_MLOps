<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prediction Result</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body { background-color: #f8f9fa; height: 100vh; display: flex; align-items: center; justify-content: center; }
        .result-card { background: white; padding: 40px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; max-width: 500px; width: 100%; }
        .prediction-text { font-size: 2rem; font-weight: bold; margin: 20px 0; }
        .churn-yes { color: #dc3545; }
        .churn-no { color: #28a745; }
    </style>
</head>
<body>

    <div class="result-card">
        <h2 class="text-secondary">Prediction Result</h2>
        <hr>
        
        <p class="lead">The model predicts the customer will:</p>
        
        <div class="prediction-text">
            {% if prediction == 1 or prediction == '1' %}
                <span class="churn-yes">CHURN</span>
                <p style="font-size: 1rem; color: #6c757d;">⚠️ This customer is likely to leave.</p>
            {% else %}
                <span class="churn-no">NOT CHURN</span>
                <p style="font-size: 1rem; color: #6c757d;">✅ This customer is likely to stay.</p>
            {% endif %}
        </div>

        <div class="mt-4">
            <a href="/" class="btn btn-primary btn-lg w-100">
                <i class="bi bi-arrow-left"></i> Back to Predictor
            </a>
        </div>
    </div>

</body>
</html>
