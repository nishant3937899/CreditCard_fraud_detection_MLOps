<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Batch Prediction Analysis</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body { background-color: #f8f9fa; padding: 40px; }
        .chart-container { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
    </style>
</head>
<body>
    <div class="container text-center">
        <div class="chart-container">
            <h2 class="mb-4">Batch Prediction Overview</h2>
            <p class="text-muted">Total Records Processed: <strong>{{ total }}</strong></p>
            
            <div class="my-4">
                {{ graph_html | safe }}
            </div>

            <div class="mt-4">
                <a href="/" class="btn btn-outline-primary">Upload Another File</a>
            </div>
        </div>
    </div>
</body>
</html>
